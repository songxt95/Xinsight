<form action="/" method="post" class="w-full text-left p-5 class-list-item flex flex-col gap-4 border-b border-slate-100 last:border-0"
      x-data='{
          lessons: {{ cls.lessons | default([]) | tojson }},
          isLoading: false,

          /* --- 花名册相关状态 --- */
          showRoster: false,
          rosterLoading: false,
          rosterLoaded: false,
          roster: [], // 结构: [{name: "张三", id: "uuid..."}, ...]
          isDeepScanning: false,

          loadLessons() {
              this.isLoading = true;
              fetch(`/api/get_curriculum?classId={{ cls.id }}`)
                  .then(res => res.json())
                  .then(data => {
                      this.lessons = data.lessons || [];
                      this.isLoading = false;
                  })
                  .catch(() => {
                      this.isLoading = false;
                      alert("课表加载失败");
                  });
          },
          isFuture(lesson) {
              if (!lesson.date) return false;
              let timeStr = lesson.start ? lesson.start : "23:59:00";
              let fullDateStr = lesson.date + "T" + timeStr;
              const lessonTime = new Date(fullDateStr);
              const now = new Date();
              return lessonTime > now;
          },

          /* --- 加载花名册 --- */
          toggleRoster() {
              this.showRoster = !this.showRoster;
              if (this.showRoster && !this.rosterLoaded) {
                  this.fetchRoster("latest");
              }
          },

          /* --- 深度扫描 --- */
          scanDeep() {
              this.isDeepScanning = true;
              this.fetchRoster("deep");
          },

          fetchRoster(mode) {
              this.rosterLoading = true;
              fetch(`/api/get_class_roster?classId={{ cls.id }}&mode=` + mode)
                  .then(res => res.json())
                  .then(data => {
                      // [v75 修改] 对象数组去重逻辑
                      // 1. 获取现有名单的名字集合
                      const existingNames = new Set(this.roster.map(s => s.name));

                      // 2. 筛选出新名单里不存在的人
                      const newStudents = data.students.filter(s => !existingNames.has(s.name));

                      // 3. 合并并排序
                      this.roster = [...this.roster, ...newStudents].sort((a, b) => a.name.localeCompare(b.name, "zh"));

                      this.rosterLoading = false;
                      this.rosterLoaded = true;
                      if(mode === "deep") this.isDeepScanning = false;
                  })
                  .catch(err => {
                      console.error(err);
                      alert("获取名单失败");
                      this.rosterLoading = false;
                      if(mode === "deep") this.isDeepScanning = false;
                  });
          }
      }'>

    <input type="hidden" name="classId" value="{{ cls.id }}">
    <input type="hidden" name="username" value="{{ username }}">
    <input type="hidden" name="className" value="{{ cls.name }}">

    <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-2">
        <div>
            <div class="text-lg font-bold mb-1 flex items-center gap-2"
                 :class="{'text-slate-800': {{ cls.status }} == 1, 'text-slate-400': {{ cls.status }} == 0}">
                {{ cls.name }}
                {% if cls.status == 0 %}
                    <span class="bg-slate-100 text-slate-400 text-xs px-2 py-0.5 rounded border border-slate-200">已结课</span>
                {% elif cls.type == '自学' %}
                    <span class="bg-emerald-50 text-emerald-600 text-xs px-2 py-0.5 rounded border border-emerald-100">自学</span>
                {% else %}
                    <span class="bg-indigo-50 text-indigo-600 text-xs px-2 py-0.5 rounded border border-indigo-100">开课中</span>
                {% endif %}
            </div>

            <div class="text-xs text-slate-500 font-mono flex flex-wrap items-center gap-3 mt-1">
                {% if cls.year %}<span class="bg-slate-50 px-1.5 py-0.5 rounded text-slate-600">{{ cls.year }}</span>{% endif %}
                {% if cls.termName %}<span class="text-slate-400">{{ cls.termName }}</span><span class="text-slate-200">|</span>{% endif %}
                {% if cls.startDate %}<span class="text-slate-500">📅 {{ cls.startDate }}</span><span class="text-slate-200">|</span>{% endif %}
                <span class="flex items-center gap-1 text-slate-600">
                    <svg class="w-3 h-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    {{ cls.time }}
                </span>
            </div>
        </div>
    </div>

    <div class="w-full border-b border-slate-50 pb-4 mb-2">
        <div x-show="isLoading" class="text-xs text-slate-400 animate-pulse py-2">
            正在获取最新课表...
        </div>

        <div x-show="!isLoading && lessons.length > 0">
            <div class="text-[10px] text-slate-400 mb-2 font-bold uppercase tracking-wide flex items-center justify-between">
                <span>选择讲次 (共 <span x-text="lessons.length"></span> 讲)</span>
                </div>

            <div class="flex flex-wrap gap-2">
                <template x-for="lesson in lessons" :key="lesson.num">
                    <button type="submit" name="cucNum" :value="lesson.num"
                        :title="lesson.name + (lesson.date ? ' (' + lesson.date + ')' : '')"
                        class="w-8 h-8 flex items-center justify-center rounded text-sm font-bold transition duration-150 border cursor-pointer select-none"
                        :class="{
                            'bg-slate-50 text-slate-300 border-slate-100 hover:bg-slate-100 hover:text-slate-400': isFuture(lesson),
                            'bg-indigo-50 text-indigo-600 border-indigo-100 hover:bg-indigo-500 hover:text-white hover:border-indigo-500 shadow-sm': !isFuture(lesson) && {{ cls.status }} == 1 && '{{ cls.type }}' != '自学',
                            'bg-emerald-50 text-emerald-600 border-emerald-100 hover:bg-emerald-500 hover:text-white hover:border-emerald-500 shadow-sm': !isFuture(lesson) && '{{ cls.type }}' == '自学',
                            'bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-500 hover:text-white hover:border-slate-500': !isFuture(lesson) && {{ cls.status }} == 0
                        }">
                        <span x-text="lesson.num"></span>
                    </button>
                </template>
            </div>
        </div>

        <div x-show="!isLoading && lessons.length === 0" class="pt-1">
            <button type="button" @click="loadLessons()" class="text-xs flex items-center gap-1 text-slate-500 hover:text-indigo-600 font-bold bg-slate-50 hover:bg-indigo-50 px-3 py-2 rounded transition border border-slate-200 hover:border-indigo-200">
                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                点击加载课表详情
            </button>
        </div>
    </div>

    <div class="w-full">
        <div @click="toggleRoster()" class="flex items-center gap-2 cursor-pointer group w-fit select-none">
            <div class="p-1 rounded bg-slate-100 text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition">
                <svg class="w-4 h-4 transition-transform duration-200" :class="{'rotate-90': showRoster}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </div>
            <span class="text-xs font-bold text-slate-500 group-hover:text-indigo-600 transition">
                <span x-text="showRoster ? '收起学员名单' : '展开学员名单(最新一讲)'"></span>
                <span x-show="roster.length > 0" class="ml-1 text-slate-400 font-normal" x-text="'(' + roster.length + '人)'"></span>
            </span>
        </div>

        <div x-show="showRoster" x-collapse>
            <div class="mt-3 pl-2 border-l-2 border-slate-100">
                <div x-show="rosterLoading" class="flex items-center gap-2 text-xs text-slate-400 py-2">
                    <svg class="animate-spin h-3 w-3" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span x-text="isDeepScanning ? '正在全量扫描所有已上课讲次...' : '正在获取最新名单...'"></span>
                </div>

                <div x-show="roster.length > 0" class="flex flex-wrap gap-2 mt-2">
                    <template x-for="stu in roster" :key="stu.name">
                        <a :href="`/report/student?classId={{ cls.id }}&className=` + encodeURIComponent('{{ cls.name }}') + `&classYear={{ cls.year }}&studentName=` + encodeURIComponent(stu.name) + `&studentId=` + (stu.id || '')"
                           target="_blank"
                           class="px-2.5 py-1 text-xs font-medium bg-slate-50 text-slate-600 rounded border border-slate-200 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition cursor-pointer select-none">
                            <span x-text="stu.name"></span>
                        </a>
                    </template>
                </div>

                <div x-show="!rosterLoading && rosterLoaded && roster.length === 0" class="text-xs text-slate-400 mt-2">
                    未找到学生数据。
                </div>

                <div x-show="rosterLoaded && !isDeepScanning" class="mt-3 pt-2 border-t border-slate-50 flex items-center">
                    <button type="button" @click="scanDeep()" class="text-[10px] flex items-center gap-1 text-slate-400 hover:text-indigo-500 transition">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        名单不全？点击扫描所有已结课讲次
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
